name = "redirect-https"
main = "worker.js"
compatibility_date = "2024-01-01"

# 环境变量在 Cloudflare Dashboard 中设置
[vars]
MAIN_DOMAIN_A = "your-domain-a.com"
MAIN_DOMAIN_B = "your-domain-b.com"
DEFAULT_V6_PORT = "50443"
AUTH_SECRET = "your-secret-here"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "STUN_HTTPS"
id = "your-kv-namespace-id"